<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F0F0F">
<title>MV CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0F0F0F;
  --surface:#1C1C1C;
  --surface-2:#141414;
  --surface-3:#242424;
  --border:#2A2A2A;
  --border-2:#333;
  --text:#F8F8F8;
  --text-2:#A0A0A0;
  --text-3:#6B6B6B;
  --accent:#3B82F6;
  --accent-2:#2563EB;
  --success:#22C55E;
  --warning:#F59E0B;
  --danger:#EF4444;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;height:100vh;height:100dvh;font-size:14px;line-height:1.45}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font:inherit;color:inherit;background:var(--surface-2);border:1px solid var(--border-2);border-radius:6px;padding:8px 10px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.25)}
::placeholder{color:var(--text-3)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
/* HEADER */
.app-header{background:var(--bg);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.app-header h1{font-size:15px;font-weight:600;letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
.app-header .logo{width:22px;height:22px;border-radius:5px;background:linear-gradient(135deg,var(--accent),#1D4ED8);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.app-header .badge{background:var(--surface);border:1px solid var(--border);padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;color:var(--text-2)}
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--success);margin-right:5px}
.sync-dot.syncing{background:var(--warning);animation:blink 1s infinite}
.sync-dot.error{background:var(--danger)}
@keyframes blink{50%{opacity:.3}}
/* CONTROLS */
.controls{background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;padding:8px 12px 8px}
.search-wrap{position:relative;margin-bottom:7px}
.search-wrap input{padding-left:32px;background:var(--surface);border-color:var(--border)}
.search-wrap::before{content:"";position:absolute;left:10px;top:50%;width:14px;height:14px;transform:translateY(-50%);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23A0A0A0' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='11' cy='11' r='7'/%3E%3Cpath d='m21 21-4.3-4.3'/%3E%3C/svg%3E");background-repeat:no-repeat}
.filter-selects{display:flex;gap:6px;margin-bottom:7px}
.filter-selects select{flex:1;background:var(--surface);border-color:var(--border);font-size:13px;padding:7px 10px;appearance:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 5l3 3 3-3' stroke='%23A0A0A0' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;padding-right:26px}
.active-chips{display:flex;flex-wrap:wrap;gap:5px;min-height:0}
.active-chips:not(:empty){min-height:24px}
.chip-active{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 6px 0 10px;border-radius:999px;background:var(--accent-2);color:#fff;font-size:11.5px;font-weight:500;border:1px solid var(--accent)}
.chip-active .x{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.2);font-size:13px;line-height:1;cursor:pointer}
.chip-active .x:hover{background:rgba(255,255,255,.35)}
/* MAIN */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);position:relative}
.view{display:none;min-height:100%}
.view.active{display:block}
/* MAP */
#view-map{height:100%}
#view-map.active{display:flex;flex-direction:column}
.map-wrap{flex:1;min-height:0;position:relative}
#map{height:100%;width:100%;background:#0a0a0a}
.leaflet-container{background:#0a0a0a;font-family:inherit}
.unlocated-badge{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:7px 14px;border-radius:999px;font-size:12px;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.5);z-index:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.unlocated-badge:hover{background:var(--accent);color:#fff}
.unlocated-badge .num{color:var(--accent);font-weight:700}
.unlocated-badge:hover .num{color:#fff}
.map-counts{position:absolute;bottom:10px;left:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-2);padding:6px 10px;border-radius:7px;font-size:11px;z-index:500;line-height:1.5}
.map-counts strong{color:var(--text);font-weight:600}
/* LIST */
.list-wrap{padding:10px 12px 90px}
.summary-bar{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--text-2);padding:2px 4px 8px}
.summary-bar strong{color:var(--text);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .12s,transform .08s;display:flex;gap:10px;align-items:flex-start}
.card:hover{border-color:var(--text-3)}
.card:active{transform:scale(.99)}
.card-main{flex:1;min-width:0}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.card-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.25;flex:1;letter-spacing:-.1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{font-size:11.5px;color:var(--text-2);display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.card-meta .sep{color:var(--text-3)}
.card-addr{font-size:12px;color:var(--text-2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;line-height:1.35}
.zone-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--surface-3);color:var(--text-2);border:1px solid var(--border)}
.status-badge{flex-shrink:0;font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap;letter-spacing:.1px}
.status-badge.s-prospect{background:#374151;color:#D1D5DB}
.status-badge.s-active{background:#052E16;color:#4ADE80}
.status-badge.s-inactive{background:#450A0A;color:#FCA5A5}
.status-badge.s-lead{background:#1E3A5F;color:#60A5FA}
.status-badge.s-declined{background:#451A03;color:#FBBF24}
.status-badge.s-unknown{background:#27272A;color:#A1A1AA}
.card-maps{flex-shrink:0;width:34px;height:34px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;text-decoration:none}
.card-maps:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}
.empty{text-align:center;padding:54px 20px;color:var(--text-3)}
.empty-icon{font-size:42px;margin-bottom:10px;opacity:.6}
/* BOTTOM NAV */
.bottom-nav{display:flex;background:var(--surface-2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-3);font-size:10.5px;font-weight:500;transition:color .15s}
.nav-btn .icon{font-size:20px;line-height:1}
.nav-btn.active{color:var(--accent)}
/* MAP POPUP */
.leaflet-popup-content-wrapper{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.6)}
.leaflet-popup-content{margin:11px 13px;font-family:inherit;min-width:210px}
.leaflet-popup-tip{background:var(--surface)}
.leaflet-popup-close-button{color:var(--text-2)!important;font-size:18px!important;padding:6px 9px!important}
.popup-title{font-weight:600;font-size:13.5px;margin-bottom:5px;color:var(--text)}
.popup-meta{font-size:11.5px;color:var(--text-2);margin-bottom:4px}
.popup-actions{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.popup-btn{padding:6px 10px;border-radius:6px;background:var(--accent);color:#fff;font-size:11px;font-weight:500;text-decoration:none;display:inline-block;border:none;cursor:pointer}
.popup-btn:hover{background:var(--accent-2);text-decoration:none}
.popup-btn.maps{background:#DC2626}
.popup-btn.maps:hover{background:#B91C1C}
.popup-btn.tel{background:#16A34A}
.pin-active{animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.85}}
/* SIDE PANEL */
.side-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(2px)}
.side-backdrop.open{opacity:1;pointer-events:auto}
.side-panel{position:fixed;top:0;right:0;bottom:0;width:100%;max-width:440px;background:var(--surface);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(0,0,0,.5)}
.side-panel.open{transform:translateX(0)}
.sp-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.sp-close{width:32px;height:32px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sp-close:hover{color:var(--text);border-color:var(--text-3)}
.sp-title{flex:1;font-size:16px;font-weight:600;color:var(--text);line-height:1.3;padding-top:5px;letter-spacing:-.1px}
.sp-title .sub{display:block;font-size:11px;color:var(--text-3);font-weight:400;margin-top:3px}
.sp-body{flex:1;overflow-y:auto;padding:14px 16px 100px}
.sp-status-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.source-tag{background:var(--surface-2);color:var(--text-2);padding:2px 8px;border-radius:999px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.3px;border:1px solid var(--border)}
.sp-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.sp-action{padding:10px 6px;border-radius:8px;background:var(--accent);color:#fff;font-size:11.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;text-align:center}
.sp-action:hover{background:var(--accent-2);text-decoration:none}
.sp-action.whatsapp{background:#16A34A}
.sp-action.whatsapp:hover{background:#15803D}
.sp-action.maps{background:#DC2626}
.sp-action.maps:hover{background:#B91C1C}
.sp-action.disabled{background:var(--surface-3);color:var(--text-3);pointer-events:none}
.sp-action .ic{font-size:15px;line-height:1}
.sp-section{margin:14px 0 7px;font-size:10.5px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sp-detail{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:10px;align-items:flex-start;font-size:13px}
.sp-detail:last-child{border-bottom:none}
.sp-detail .lbl{color:var(--text-3);font-size:11px;flex-shrink:0;min-width:78px;text-transform:uppercase;letter-spacing:.3px;font-weight:600;padding-top:1px}
.sp-detail .val{flex:1;text-align:right;color:var(--text);word-break:break-word;font-size:12.5px;line-height:1.4}
.sp-detail .val.empty{color:var(--text-3);font-style:italic}
.sp-detail .val a{color:#60A5FA}
.sp-field{margin-bottom:9px}
.sp-field label{display:block;font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.3px;font-weight:600;margin-bottom:4px}
.sp-field input,.sp-field select,.sp-field textarea{font-size:13px;background:var(--surface-2)}
.sp-field textarea{min-height:78px;resize:vertical;line-height:1.45}
.sp-save-bar{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:7px;align-items:center}
.sp-save-bar .status-text{font-size:11px;color:var(--text-3);flex:1}
.sp-save-bar .status-text.saving{color:var(--warning)}
.sp-save-bar .status-text.saved{color:var(--success)}
.sp-save-bar .status-text.err{color:var(--danger)}
.btn-primary{background:var(--accent);color:#fff;padding:10px 18px;border-radius:7px;font-size:13px;font-weight:600;border:1px solid var(--accent);min-width:80px}
.btn-primary:hover{background:var(--accent-2)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-secondary{background:transparent;color:var(--text);padding:10px 18px;border-radius:7px;font-size:13px;font-weight:600;border:1px solid var(--border-2)}
.btn-secondary:hover{border-color:var(--text-3);background:var(--surface-2)}
/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border-2);color:var(--text);padding:9px 16px;border-radius:999px;font-size:12.5px;z-index:2000;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.6)}
.toast.show{opacity:1}
.toast.error{background:var(--danger);border-color:var(--danger);color:#fff}
.toast.success{background:var(--success);border-color:var(--success);color:#fff}
/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text-2);font-size:13px}
.error-screen{text-align:center;padding:20px;max-width:88vw}
.error-screen .icon{font-size:42px;margin-bottom:14px}
.error-screen .ttl{font-size:15px;color:var(--danger);font-weight:600;margin-bottom:10px}
.error-screen .msg{font-size:12.5px;color:var(--text-2);line-height:1.55;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);padding:10px;border-radius:8px;text-align:left;font-family:"SF Mono",ui-monospace,monospace}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Po lidhem me Supabase...</div>
</div>

<header class="app-header">
  <h1><span class="logo">MV</span><span><span class="sync-dot" id="sync-dot"></span>CRM</span></h1>
  <span class="badge" id="header-count">0</span>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Kërko biznes..." autocomplete="off">
  </div>
  <div class="filter-selects">
    <select id="zone-select"><option value="">Të gjitha zonat</option></select>
    <select id="status-select"><option value="">Të gjithë statuset</option></select>
  </div>
  <div class="active-chips" id="active-chips"></div>
</div>

<main class="main">
  <section class="view active" id="view-map">
    <div class="map-wrap">
      <div id="map"></div>
      <button class="unlocated-badge" id="unlocated-badge" style="display:none">
        <span class="num" id="unlocated-num">0</span> pa koordinata
      </button>
      <div class="map-counts" id="map-counts"></div>
    </div>
  </section>
  <section class="view" id="view-list">
    <div class="list-wrap">
      <div class="summary-bar">
        <span><strong id="visible-count">0</strong> rezultate</span>
        <span id="extra-info"></span>
      </div>
      <div id="cards"></div>
    </div>
  </section>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" data-view="map"><span class="icon">🗺️</span><span>Harta</span></button>
  <button class="nav-btn" data-view="list"><span class="icon">📋</span><span>Lista</span></button>
</nav>

<div class="side-backdrop" id="side-backdrop"></div>
<aside class="side-panel" id="side-panel"></aside>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const SUPABASE_URL="https://brblmltkxpblmtwcgtlm.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJyYmxtbHRreHBibG10d2NndGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDAyMjksImV4cCI6MjA5NzYxNjIyOX0.UqWXBKU8fT5JWUkmpSATyqiHyigen4I80K34q4SvPUY";
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const TIRANA_CENTER=[41.3275,19.8187];
const TIRANA_ZOOM=14;

// New status vocabulary (per spec)
const STATUS_DEFS=[
  {key:"prospect",label:"Prospekt",color:"#9CA3AF",cls:"s-prospect"},
  {key:"active",label:"Aktiv",color:"#22C55E",cls:"s-active"},
  {key:"inactive",label:"Joaktiv",color:"#EF4444",cls:"s-inactive"},
  {key:"lead",label:"Lead",color:"#3B82F6",cls:"s-lead"},
  {key:"declined",label:"Refuzuar",color:"#F59E0B",cls:"s-declined"},
];
const STATUS_BY_KEY=Object.fromEntries(STATUS_DEFS.map(s=>[s.key,s]));
function statusInfo(s){
  if(!s)return{key:"unknown",label:"—",color:"#6B7280",cls:"s-unknown"};
  const norm=String(s).toLowerCase().trim();
  return STATUS_BY_KEY[norm]||{key:s,label:s,color:"#6B7280",cls:"s-unknown"};
}

const EDITABLE_FIELDS=["status","phone","contact_person","general_notes","next_followup","order_value"];

/* ============================================================
   STATE
   ============================================================ */
let clients=[];
let state={
  view:"map",
  search:"",
  zoneFilter:"",
  statusFilter:"",
  unlocatedOnly:false,
  activeClientId:null,
  panelDirty:false,
};
let map=null,markersLayer=null;

/* ============================================================
   HELPERS
   ============================================================ */
function $(id){return document.getElementById(id)}
function escapeHtml(s){return(s==null?"":String(s)).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function escapeAttr(s){return(s==null?"":String(s)).replace(/"/g,"&quot;")}
function normalize(s){return(s||"").toLowerCase().replace(/[^\p{L}\p{N}\s]/gu,"").replace(/\s+/g," ").trim()}
function nowISO(){return new Date().toISOString()}
function fmtDate(d){if(!d)return"";const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleDateString("sq-AL",{day:"2-digit",month:"short",year:"numeric"})}
function fmtDateTime(d){if(!d)return"";const dt=new Date(d);return isNaN(dt)?d:dt.toLocaleString("sq-AL",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}
function setSync(s){$("sync-dot").className="sync-dot"+(s==="syncing"?" syncing":s==="error"?" error":"")}
function toast(msg,kind=""){const t=$("toast");t.textContent=msg;t.className="toast show"+(kind?" "+kind:"");clearTimeout(window._tt);window._tt=setTimeout(()=>t.className="toast"+(kind?" "+kind:""),2000)}

/* ============================================================
   SUPABASE I/O
   ============================================================ */
async function loadAllClients(){
  setSync("syncing");
  // Paginate to fetch >1000 rows
  const all=[];
  let from=0;
  while(true){
    const{data,error}=await sb.from("clients").select("*").order("business_name").range(from,from+999);
    if(error){setSync("error");throw error}
    all.push(...data);
    if(data.length<1000)break;
    from+=1000;
  }
  clients=all;
  setSync("");
  return clients;
}

async function updateClient(id,patch){
  setSync("syncing");
  const{error}=await sb.from("clients").update({...patch,updated_at:nowISO()}).eq("id",id);
  if(error){setSync("error");return{ok:false,error}}
  const i=clients.findIndex(c=>c.id===id);
  if(i>=0)clients[i]={...clients[i],...patch};
  setSync("");
  return{ok:true};
}

async function init(){
  try{
    await loadAllClients();
    $("loading").style.display="none";
    populateFilterOptions();
    setView("map");
  }catch(e){
    console.error(e);
    $("loading").innerHTML=`
      <div class="error-screen">
        <div class="icon">⚠️</div>
        <div class="ttl">Lidhja me Supabase dështoi</div>
        <div class="msg">${escapeHtml(e.message||"Gabim i panjohur")}</div>
        <button class="btn-primary" style="width:100%" onclick="location.reload()">Provo Përsëri</button>
      </div>`;
  }
}

/* ============================================================
   FILTERS
   ============================================================ */
function populateFilterOptions(){
  const zoneSel=$("zone-select");
  const zones=[...new Set(clients.map(c=>c.zone).filter(Boolean))].sort();
  zoneSel.innerHTML=`<option value="">Të gjitha zonat</option>`+zones.map(z=>`<option value="${escapeAttr(z)}" ${state.zoneFilter===z?"selected":""}>${escapeHtml(z)}</option>`).join("");

  const statusSel=$("status-select");
  const knownKeys=new Set(STATUS_DEFS.map(s=>s.key));
  const extraStatuses=[...new Set(clients.map(c=>(c.status||"").trim()).filter(s=>s&&!knownKeys.has(s.toLowerCase())))].sort();
  let opts=`<option value="">Të gjithë statuset</option>`;
  STATUS_DEFS.forEach(s=>{opts+=`<option value="${s.key}" ${state.statusFilter===s.key?"selected":""}>${s.label}</option>`});
  if(extraStatuses.length){
    opts+=`<option disabled>──────</option>`;
    extraStatuses.forEach(s=>{opts+=`<option value="${escapeAttr(s)}" ${state.statusFilter===s?"selected":""}>${escapeHtml(s)}</option>`});
  }
  statusSel.innerHTML=opts;
}

function renderActiveChips(){
  const host=$("active-chips");
  const chips=[];
  if(state.zoneFilter)chips.push({label:`Zona: ${state.zoneFilter}`,clear:()=>{state.zoneFilter="";$("zone-select").value="";applyFiltersAndRender()}});
  if(state.statusFilter){
    const info=statusInfo(state.statusFilter);
    chips.push({label:`Status: ${info.label}`,clear:()=>{state.statusFilter="";$("status-select").value="";applyFiltersAndRender()}});
  }
  if(state.unlocatedOnly)chips.push({label:`Vetëm pa koordinata`,clear:()=>{state.unlocatedOnly=false;applyFiltersAndRender()}});
  host.innerHTML=chips.map((c,i)=>`<span class="chip-active" data-i="${i}">${escapeHtml(c.label)}<span class="x">×</span></span>`).join("");
  host.querySelectorAll(".chip-active").forEach((el,i)=>{el.querySelector(".x").onclick=()=>chips[i].clear()});
}

function applyFilters(){
  const q=normalize(state.search);
  return clients.filter(c=>{
    if(state.zoneFilter&&c.zone!==state.zoneFilter)return false;
    if(state.statusFilter){
      const cs=(c.status||"").toLowerCase();
      const f=state.statusFilter.toLowerCase();
      if(cs!==f)return false;
    }
    if(state.unlocatedOnly){
      if(c.lat!=null&&c.lng!=null)return false;
      if(!c.maps_url)return false;
    }
    if(q){
      if(!normalize(c.business_name).includes(q))return false;
    }
    return true;
  });
}

function applyFiltersAndRender(){
  renderActiveChips();
  render();
}

/* ============================================================
   MAP
   ============================================================ */
function initMap(){
  if(map)return;
  map=L.map("map",{zoomControl:true,attributionControl:false}).setView(TIRANA_CENTER,TIRANA_ZOOM);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png",{maxZoom:19,attribution:"©OSM ©CARTO"}).addTo(map);
  L.control.attribution({prefix:false,position:"bottomright"}).addTo(map);
  markersLayer=L.layerGroup().addTo(map);
}

function renderMap(){
  initMap();
  setTimeout(()=>map.invalidateSize(),60);
  markersLayer.clearLayers();
  const filtered=applyFilters();
  const withCoords=filtered.filter(c=>c.lat!=null&&c.lng!=null);
  const unlocatedWithUrl=filtered.filter(c=>(c.lat==null||c.lng==null)&&c.maps_url);

  withCoords.forEach(c=>{
    const info=statusInfo(c.status);
    const isActive=info.key==="active";
    const html=`<div style="background:${info.color};width:18px;height:18px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.6)" class="${isActive?"pin-active":""}"></div>`;
    const icon=L.divIcon({html,className:"",iconSize:[18,18],iconAnchor:[9,9]});
    const m=L.marker([c.lat,c.lng],{icon});
    const phoneClean=(c.phone||"").replace(/[^\d+]/g,"");
    const mapsHref=c.maps_url||`https://maps.google.com/?q=${c.lat},${c.lng}`;
    const popup=`
      <div class="popup-title">${escapeHtml(c.business_name)}</div>
      ${c.address?`<div class="popup-meta">${escapeHtml(c.address)}</div>`:""}
      <div class="popup-meta"><span class="status-badge ${info.cls}">${escapeHtml(info.label)}</span>${c.zone?` <span class="zone-badge" style="margin-left:4px">${escapeHtml(c.zone)}</span>`:""}</div>
      ${phoneClean?`<div class="popup-meta">📞 <a href="tel:${escapeAttr(phoneClean)}" style="color:#60A5FA">${escapeHtml(c.phone)}</a></div>`:""}
      <div class="popup-actions">
        <button class="popup-btn" onclick="openPanel('${c.id}')">Detaje</button>
        <a class="popup-btn maps" href="${escapeAttr(mapsHref)}" target="_blank" rel="noopener">📍 Hap Maps</a>
      </div>`;
    m.bindPopup(popup);
    markersLayer.addLayer(m);
  });

  if(withCoords.length>0){
    const g=L.featureGroup(markersLayer.getLayers());
    if(g.getBounds().isValid())map.fitBounds(g.getBounds(),{padding:[40,40],maxZoom:15});
  }else{
    map.setView(TIRANA_CENTER,TIRANA_ZOOM);
  }

  // Unlocated badge
  const badge=$("unlocated-badge");
  if(unlocatedWithUrl.length>0){
    badge.style.display="flex";
    $("unlocated-num").textContent=unlocatedWithUrl.length;
    badge.onclick=()=>{state.unlocatedOnly=true;setView("list");applyFiltersAndRender()};
  }else{
    badge.style.display="none";
  }

  // Counts pill
  $("map-counts").innerHTML=`<strong>${withCoords.length}</strong> në hartë · <strong>${filtered.length-withCoords.length}</strong> pa koordinata`;
  $("header-count").textContent=`${clients.length} biznese`;
}

/* ============================================================
   LIST
   ============================================================ */
function renderList(){
  const filtered=applyFilters();
  $("visible-count").textContent=filtered.length;
  $("header-count").textContent=`${clients.length} biznese`;
  const unloc=filtered.filter(c=>c.lat==null||c.lng==null).length;
  $("extra-info").innerHTML=unloc?`<span style="color:var(--warning)">${unloc} pa koordinata</span>`:"";

  const wrap=$("cards");
  if(filtered.length===0){
    wrap.innerHTML=`<div class="empty"><div class="empty-icon">🔎</div><div>Asnjë rezultat</div></div>`;
    return;
  }
  // Cap large lists for perf (still searchable to find specific records)
  const cap=500;
  const list=filtered.slice(0,cap);
  wrap.innerHTML=list.map(c=>{
    const info=statusInfo(c.status);
    const mapsHref=c.maps_url||(c.lat!=null&&c.lng!=null?`https://maps.google.com/?q=${c.lat},${c.lng}`:null);
    return `
      <div class="card" data-id="${c.id}">
        <div class="card-main">
          <div class="card-head">
            <div class="card-name">${escapeHtml(c.business_name)}</div>
            <div class="status-badge ${info.cls}">${escapeHtml(info.label)}</div>
          </div>
          <div class="card-meta">
            ${c.zone?`<span class="zone-badge">${escapeHtml(c.zone)}</span>`:""}
            ${c.business_type?`<span>${escapeHtml(c.business_type)}</span>`:""}
            ${c.phone?`<span class="sep">·</span><span>📞 ${escapeHtml(c.phone)}</span>`:""}
          </div>
          ${c.address?`<div class="card-addr">📍 ${escapeHtml(c.address)}</div>`:""}
        </div>
        ${mapsHref?`<a class="card-maps" href="${escapeAttr(mapsHref)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Hap Maps">📍</a>`:""}
      </div>`;
  }).join("")+(filtered.length>cap?`<div style="text-align:center;color:var(--text-3);font-size:11.5px;padding:14px">Po shfaq ${cap} nga ${filtered.length}. Përdor kërkimin për të gjetur specifik.</div>`:"");
  wrap.querySelectorAll(".card").forEach(el=>el.onclick=()=>openPanel(el.dataset.id));
}

/* ============================================================
   SIDE PANEL
   ============================================================ */
function openPanel(id){
  const c=clients.find(x=>x.id===id);
  if(!c)return;
  state.activeClientId=id;
  state.panelDirty=false;
  const info=statusInfo(c.status);
  const phone=c.phone||"";
  const phoneClean=phone.replace(/[^\d+]/g,"");
  const hasCoords=c.lat!=null&&c.lng!=null;
  const mapsHref=c.maps_url||(hasCoords?`https://maps.google.com/?q=${c.lat},${c.lng}`:"");
  const statusOpts=[...STATUS_DEFS.map(s=>({key:s.key,label:s.label}))];
  // include legacy status if not in standard list
  if(c.status&&!STATUS_BY_KEY[c.status.toLowerCase()])statusOpts.push({key:c.status,label:c.status+" (legacy)"});

  $("side-panel").innerHTML=`
    <div class="sp-head">
      <button class="sp-close" onclick="closePanel()" aria-label="Mbyll">✕</button>
      <div class="sp-title">${escapeHtml(c.business_name)}<span class="sub">${escapeHtml(c.zone||"")}${c.business_type?(c.zone?" · ":"")+escapeHtml(c.business_type):""}</span></div>
    </div>
    <div class="sp-body">
      <div class="sp-status-row">
        <div class="status-badge ${info.cls}">${escapeHtml(info.label)}</div>
        ${c.source?`<span class="source-tag">${escapeHtml(c.source)}</span>`:""}
      </div>

      <div class="sp-actions">
        <a class="sp-action ${phoneClean?"":"disabled"}" href="${phoneClean?`tel:${phoneClean}`:"#"}"><span class="ic">📞</span>Telefono</a>
        <a class="sp-action whatsapp ${phoneClean?"":"disabled"}" href="${phoneClean?`https://wa.me/${phoneClean.replace(/^\+/,"")}`:"#"}" target="_blank" rel="noopener"><span class="ic">💬</span>WhatsApp</a>
        <a class="sp-action maps ${mapsHref?"":"disabled"}" href="${escapeAttr(mapsHref||"#")}" target="_blank" rel="noopener"><span class="ic">📍</span>Maps</a>
      </div>

      <div class="sp-section">Të dhëna bazë</div>
      <div class="sp-detail"><span class="lbl">Emri</span><span class="val">${escapeHtml(c.business_name)}</span></div>
      <div class="sp-detail"><span class="lbl">Adresa</span><span class="val ${c.address?"":"empty"}">${escapeHtml(c.address||"—")}</span></div>
      <div class="sp-detail"><span class="lbl">Zona</span><span class="val ${c.zone?"":"empty"}">${escapeHtml(c.zone||"—")}</span></div>
      <div class="sp-detail"><span class="lbl">Tipi</span><span class="val ${c.business_type?"":"empty"}">${escapeHtml(c.business_type||"—")}</span></div>
      <div class="sp-detail"><span class="lbl">Koordinatat</span><span class="val ${hasCoords?"":"empty"}">${hasCoords?`${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}`:"—"}</span></div>
      ${c.maps_url?`<div class="sp-detail"><span class="lbl">Maps URL</span><span class="val"><a href="${escapeAttr(c.maps_url)}" target="_blank" rel="noopener">Hap Maps ↗</a></span></div>`:""}
      <div class="sp-detail"><span class="lbl">Burimi</span><span class="val ${c.source?"":"empty"}">${escapeHtml(c.source||"—")}</span></div>
      ${c.decline_reason?`<div class="sp-detail"><span class="lbl">Refuzim</span><span class="val">${escapeHtml(c.decline_reason)}</span></div>`:""}
      <div class="sp-detail"><span class="lbl">Krijuar</span><span class="val">${escapeHtml(fmtDateTime(c.created_at))}</span></div>
      ${c.updated_at?`<div class="sp-detail"><span class="lbl">Ndryshuar</span><span class="val">${escapeHtml(fmtDateTime(c.updated_at))}</span></div>`:""}

      <div class="sp-section">Editable</div>

      <div class="sp-field">
        <label>Statusi</label>
        <select id="sp-status" data-field="status">
          ${statusOpts.map(s=>`<option value="${escapeAttr(s.key)}" ${c.status===s.key?"selected":""}>${escapeHtml(s.label)}</option>`).join("")}
        </select>
      </div>

      <div class="sp-field">
        <label>Telefoni</label>
        <input type="tel" id="sp-phone" data-field="phone" value="${escapeAttr(c.phone||"")}" placeholder="+355 6X XXX XXXX">
      </div>

      <div class="sp-field">
        <label>Personi kontakt</label>
        <input type="text" id="sp-contact" data-field="contact_person" value="${escapeAttr(c.contact_person||"")}" placeholder="Emri i personit">
      </div>

      <div class="sp-field">
        <label>Ndjekje tjetër</label>
        <input type="date" id="sp-followup" data-field="next_followup" value="${c.next_followup||""}">
      </div>

      <div class="sp-field">
        <label>Vlera e porosisë (L)</label>
        <input type="number" step="any" id="sp-value" data-field="order_value" value="${escapeAttr(c.order_value??"")}" placeholder="0">
      </div>

      <div class="sp-field">
        <label>Shënime</label>
        <textarea id="sp-notes" data-field="general_notes" placeholder="Shkruaj shënime...">${escapeHtml(c.general_notes||"")}</textarea>
      </div>
    </div>

    <div class="sp-save-bar">
      <span class="status-text" id="sp-status-text"></span>
      <button class="btn-secondary" onclick="closePanel()">Mbyll</button>
      <button class="btn-primary" id="sp-save-btn" onclick="savePanel()">Ruaj</button>
    </div>`;

  $("side-panel").classList.add("open");
  $("side-backdrop").classList.add("open");
  document.body.style.overflow="hidden";

  // Track dirty state
  $("side-panel").querySelectorAll("[data-field]").forEach(el=>{
    el.addEventListener("input",()=>{state.panelDirty=true;markStatusText("",""); });
  });
}

function markStatusText(txt,kind){
  const el=$("sp-status-text");if(!el)return;
  el.textContent=txt;
  el.className="status-text"+(kind?" "+kind:"");
}

function closePanel(){
  if(state.panelDirty){
    if(!confirm("Ke ndryshime të paruajtura. Të largohem pa ruajtur?"))return;
  }
  $("side-panel").classList.remove("open");
  $("side-backdrop").classList.remove("open");
  document.body.style.overflow="";
  state.activeClientId=null;
  state.panelDirty=false;
}

async function savePanel(){
  const id=state.activeClientId;
  if(!id)return;
  const patch={};
  $("side-panel").querySelectorAll("[data-field]").forEach(el=>{
    const f=el.dataset.field;
    let v=el.value;
    if(typeof v==="string")v=v.trim();
    if(f==="order_value")v=v===""?null:Number(v);
    else if(v==="")v=null;
    patch[f]=v;
  });

  const btn=$("sp-save-btn");
  btn.disabled=true;
  markStatusText("Po ruaj...","saving");
  const{ok,error}=await updateClient(id,patch);
  btn.disabled=false;
  if(!ok){
    markStatusText("Gabim: "+(error?.message||"e panjohur"),"err");
    toast("Ruajtja dështoi","error");
    return;
  }
  state.panelDirty=false;
  markStatusText("Ruajtur ✓","saved");
  toast("Ndryshimet u ruajtën ✓","success");
  populateFilterOptions();
  render();
  setTimeout(()=>markStatusText("",""),2200);
}

/* ============================================================
   VIEW SWITCHING + EVENTS
   ============================================================ */
function setView(v){
  state.view=v;
  document.querySelectorAll(".view").forEach(el=>el.classList.toggle("active",el.id==="view-"+v));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.view===v));
  render();
}

function render(){
  if(state.view==="map")renderMap();
  else renderList();
}

document.querySelectorAll(".nav-btn").forEach(b=>{b.onclick=()=>setView(b.dataset.view)});
$("search").oninput=e=>{state.search=e.target.value;render()};
$("zone-select").onchange=e=>{state.zoneFilter=e.target.value;applyFiltersAndRender()};
$("status-select").onchange=e=>{state.statusFilter=e.target.value;applyFiltersAndRender()};
$("side-backdrop").onclick=closePanel;
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&state.activeClientId)closePanel()});

// Expose
window.openPanel=openPanel;
window.closePanel=closePanel;
window.savePanel=savePanel;

init();
</script>
</body>
